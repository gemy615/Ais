<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>اختبار اختيار من متعدد - الادارة الحكومية</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0F0D;
    --card: #111916;
    --border: #1e2e24;
    --orange: #E8820C;
    --orange-dim: rgba(232,130,12,0.12);
    --green: #2D9E5F;
    --green-dim: rgba(45,158,95,0.12);
    --red: #E84444;
    --red-dim: rgba(232,68,68,0.12);
    --blue: #3a8fd4;
    --blue-dim: rgba(58,143,212,0.12);
    --text: #e8f0eb;
    --muted: #7a9485;
    --white: #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── PARTICLES ─── */
  #particles {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    opacity: 0;
    animation: float-up linear infinite;
  }
  @keyframes float-up {
    0%   { transform: translateY(100vh) scale(0); opacity: 0; }
    10%  { opacity: 0.35; }
    90%  { opacity: 0.08; }
    100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
  }

  /* ─── SCREENS ─── */
  .screen {
    position: relative; z-index: 1;
    display: none;
    min-height: 100vh;
    padding: 24px 16px 40px;
    animation: fadeIn 0.45s ease;
  }
  .screen.active { display: flex; flex-direction: column; align-items: center; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ══ WELCOME ══ */
  #screen-welcome {
    justify-content: center;
    text-align: center;
    gap: 26px;
  }
  .logo-ring {
    width: 116px; height: 116px;
    border-radius: 50%;
    border: 3px solid var(--orange);
    display: flex; align-items: center; justify-content: center;
    font-size: 52px;
    background: var(--orange-dim);
    animation: pulse-ring 2.2s ease-in-out infinite;
    box-shadow: 0 0 40px rgba(232,130,12,0.28);
  }
  @keyframes pulse-ring {
    0%,100% { box-shadow: 0 0 28px rgba(232,130,12,0.28); }
    50%      { box-shadow: 0 0 60px rgba(232,130,12,0.5); }
  }
  .welcome-title {
    font-size: 25px; font-weight: 900; line-height: 1.35;
    background: linear-gradient(135deg, var(--orange), #f0a94a);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .welcome-sub { font-size: 14px; color: var(--muted); line-height: 1.75; }
  .stats-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .stat-chip {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 10px 20px;
    font-size: 14px; font-weight: 700;
    display: flex; align-items: center; gap: 8px;
  }
  .stat-chip span { color: var(--orange); font-size: 18px; }
  .btn-start {
    background: linear-gradient(135deg, var(--orange), #f0a94a);
    color: #000; font-family: 'Cairo', sans-serif;
    font-size: 18px; font-weight: 900;
    border: none; border-radius: 16px;
    padding: 18px 48px; cursor: pointer;
    width: 100%; max-width: 320px;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 8px 30px rgba(232,130,12,0.4);
  }
  .btn-start:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(232,130,12,0.5); }
  .btn-start:active { transform: translateY(0); }

  /* ══ QUIZ ══ */
  #screen-quiz {
    justify-content: flex-start;
    gap: 18px;
    max-width: 600px;
    width: 100%;
    margin: 0 auto;
  }

  .quiz-header {
    width: 100%;
    display: flex; align-items: center; justify-content: space-between;
  }
  .q-counter { font-size: 13px; color: var(--muted); font-weight: 600; }
  .q-counter strong { color: var(--orange); font-size: 18px; }
  .score-badge {
    background: var(--green-dim);
    border: 1px solid var(--green);
    border-radius: 50px;
    padding: 6px 14px;
    font-size: 13px; color: var(--green); font-weight: 700;
  }

  .progress-wrap {
    width: 100%; background: var(--border);
    border-radius: 100px; height: 6px; overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--orange), #f0a94a);
    border-radius: 100px;
    transition: width 0.4s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 0 10px rgba(232,130,12,0.5);
  }

  /* question card */
  .q-card {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 22px;
    animation: slideIn 0.4s cubic-bezier(.4,0,.2,1);
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(40px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes slideInRight {
    from { opacity: 0; transform: translateX(-40px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .q-label {
    font-size: 11px; color: var(--orange); font-weight: 700;
    letter-spacing: 1px; margin-bottom: 10px;
  }
  .q-text { font-size: 16px; font-weight: 700; line-height: 1.7; color: var(--white); }

  /* choices */
  .choices { width: 100%; display: flex; flex-direction: column; gap: 10px; }

  .choice-btn {
    width: 100%;
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    font-family: 'Cairo', sans-serif;
    font-size: 15px; font-weight: 600;
    color: var(--text);
    cursor: pointer;
    display: flex; align-items: center; gap: 12px;
    transition: all 0.22s;
    text-align: right;
  }
  .choice-letter {
    min-width: 34px; height: 34px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 900;
    background: var(--border);
    color: var(--muted);
    transition: all 0.22s;
    flex-shrink: 0;
  }
  .choice-btn:hover:not(:disabled) {
    border-color: var(--orange);
    background: var(--orange-dim);
    transform: translateX(-3px);
  }
  .choice-btn:hover:not(:disabled) .choice-letter {
    background: var(--orange); color: #000;
  }

  /* states */
  .choice-btn.correct {
    border-color: var(--green);
    background: var(--green-dim);
    animation: popIn 0.4s cubic-bezier(.4,0,.2,1);
  }
  .choice-btn.correct .choice-letter { background: var(--green); color: #fff; }

  .choice-btn.wrong {
    border-color: var(--red);
    background: var(--red-dim);
    animation: shake 0.4s ease;
  }
  .choice-btn.wrong .choice-letter { background: var(--red); color: #fff; }

  .choice-btn.dim { opacity: 0.38; }

  @keyframes popIn {
    0%  { transform: scale(1); }
    50% { transform: scale(1.03); }
    100%{ transform: scale(1); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-7px); }
    75%      { transform: translateX(7px); }
  }

  /* feedback */
  .feedback-box {
    width: 100%;
    border-radius: 14px;
    padding: 14px 16px;
    font-size: 14px; line-height: 1.7;
    display: none;
    animation: fadeIn 0.3s ease;
  }
  .feedback-box.show { display: block; }
  .feedback-box.correct-fb { background: var(--green-dim); border: 1px solid var(--green); color: var(--green); }
  .feedback-box.wrong-fb   { background: var(--red-dim);   border: 1px solid var(--red);   color: #ff8888; }
  .feedback-title { font-weight: 900; font-size: 15px; margin-bottom: 5px; }

  /* nav buttons */
  .nav-row { width: 100%; display: flex; gap: 10px; }

  .btn-prev {
    background: var(--card);
    border: 2px solid var(--muted);
    color: var(--muted);
    font-family: 'Cairo', sans-serif;
    font-size: 15px; font-weight: 700;
    border-radius: 14px;
    padding: 15px 18px;
    cursor: pointer;
    display: none;
    transition: all 0.22s;
    white-space: nowrap;
  }
  .btn-prev.show { display: block; }
  .btn-prev:hover { border-color: var(--text); color: var(--text); }

  .btn-next {
    flex: 1;
    background: var(--card);
    border: 2px solid var(--orange);
    color: var(--orange);
    font-family: 'Cairo', sans-serif;
    font-size: 16px; font-weight: 700;
    border-radius: 14px;
    padding: 15px;
    cursor: pointer;
    display: none;
    transition: all 0.22s;
  }
  .btn-next.show { display: block; animation: fadeIn 0.3s ease; }
  .btn-next:hover { background: var(--orange); color: #000; }

  /* ══ RESULT ══ */
  #screen-result {
    justify-content: flex-start;
    gap: 22px;
    max-width: 560px;
    width: 100%;
    margin: 0 auto;
    padding-top: 36px;
  }
  .result-circle {
    width: 144px; height: 144px;
    border-radius: 50%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-size: 34px; font-weight: 900;
    position: relative;
    animation: scalePop 0.6s cubic-bezier(.4,0,.2,1);
  }
  @keyframes scalePop {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  .result-circle::before {
    content: '';
    position: absolute; inset: -4px;
    border-radius: 50%;
    background: conic-gradient(var(--c1) var(--pct), var(--border) 0);
    z-index: -1;
  }
  .result-circle::after {
    content: '';
    position: absolute; inset: 0;
    border-radius: 50%;
    background: var(--card);
    z-index: -1;
  }
  .result-pct-label { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .result-msg { text-align: center; }
  .result-msg h2 { font-size: 22px; font-weight: 900; margin-bottom: 8px; }
  .result-msg p  { font-size: 14px; color: var(--muted); }

  .result-stats {
    width: 100%;
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  .rs-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 18px; text-align: center;
  }
  .rs-num   { font-size: 28px; font-weight: 900; }
  .rs-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .result-btns { width: 100%; display: flex; flex-direction: column; gap: 12px; }
  .btn-review {
    width: 100%;
    background: var(--red-dim);
    border: 2px solid var(--red);
    color: #ff8888;
    font-family: 'Cairo', sans-serif;
    font-size: 16px; font-weight: 700;
    border-radius: 14px; padding: 16px;
    cursor: pointer; transition: all 0.22s;
  }
  .btn-review:hover { background: var(--red); color: #fff; }
  .btn-restart {
    width: 100%;
    background: linear-gradient(135deg, var(--orange), #f0a94a);
    border: none; color: #000;
    font-family: 'Cairo', sans-serif;
    font-size: 16px; font-weight: 900;
    border-radius: 14px; padding: 16px;
    cursor: pointer; transition: all 0.22s;
    box-shadow: 0 6px 24px rgba(232,130,12,0.35);
  }
  .btn-restart:hover { transform: translateY(-2px); }

  /* ══ REVIEW ══ */
  #screen-review {
    justify-content: flex-start;
    gap: 14px;
    max-width: 600px;
    width: 100%;
    margin: 0 auto;
  }
  .review-header {
    width: 100%;
    display: flex; align-items: center; justify-content: space-between;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .review-title { font-size: 18px; font-weight: 900; color: var(--red); }
  .review-count {
    background: var(--red-dim); border: 1px solid var(--red);
    border-radius: 50px; padding: 4px 12px;
    font-size: 13px; color: #ff8888; font-weight: 700;
  }
  .review-item {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-right: 4px solid var(--red);
    border-radius: 16px;
    padding: 18px;
    animation: fadeIn 0.3s ease;
  }
  .review-q-num { font-size: 11px; color: var(--red); font-weight: 700; letter-spacing: 1px; margin-bottom: 8px; }
  .review-q-text { font-size: 15px; font-weight: 700; color: var(--white); line-height: 1.6; margin-bottom: 14px; }
  .review-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
  .review-tag {
    min-width: 62px; text-align: center;
    border-radius: 6px; padding: 3px 8px;
    font-size: 12px; font-weight: 700;
  }
  .tag-wrong   { background: var(--red-dim);   color: var(--red);   border: 1px solid var(--red); }
  .tag-correct { background: var(--green-dim); color: var(--green); border: 1px solid var(--green); }
  .review-answer-text { font-size: 13px; color: var(--muted); line-height: 1.6; }

  .btn-back {
    width: 100%;
    background: var(--card);
    border: 2px solid var(--green);
    color: var(--green);
    font-family: 'Cairo', sans-serif;
    font-size: 16px; font-weight: 700;
    border-radius: 14px; padding: 16px;
    cursor: pointer; transition: all 0.22s;
    margin-top: 6px;
  }
  .btn-back:hover { background: var(--green); color: #000; }

  /* confetti */
  .confetti-piece {
    position: fixed; width: 8px; height: 14px;
    border-radius: 2px; top: -20px;
    animation: confetti-fall 3s ease-in forwards;
    z-index: 999; pointer-events: none;
  }
  @keyframes confetti-fall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<div id="particles"></div>

<!-- ══ WELCOME ══ -->
<div id="screen-welcome" class="screen active">
  <div class="logo-ring">📝</div>
  <div>
    <div class="welcome-title">اختبار اختيار من متعدد<br>نظم المعلومات المحاسبية</div>
  </div>
  <div class="welcome-sub">
    اختبار اختيار من متعدد<br>
    اختار الإجابة الصحيحة واعرف نتيجتك!
  </div>
  <div class="stats-row">
    <div class="stat-chip"><span id="welcome-count">0</span> سؤال</div>
    <div class="stat-chip">🎯 اختيار من متعدد</div>
  </div>
  <button class="btn-start" onclick="startQuiz()">🚀 ابدأ الاختبار</button>
</div>

<!-- ══ QUIZ ══ -->
<div id="screen-quiz" class="screen">
  <div class="quiz-header" style="width:100%">
    <div class="q-counter">سؤال <strong id="q-num">1</strong> / <span id="q-total">70</span></div>
    <div class="score-badge">✅ <span id="live-score">0</span></div>
  </div>
  <div class="progress-wrap" style="width:100%">
    <div class="progress-bar" id="progress-bar" style="width:0%"></div>
  </div>
  <div class="q-card" id="q-card">
    <div class="q-label">📝 اختر الإجابة الصحيحة</div>
    <div class="q-text" id="q-text"></div>
  </div>
  <div class="choices" id="choices"></div>
  <div class="feedback-box" id="feedback"></div>
  <div class="nav-row">
    <button class="btn-prev" id="btn-prev" onclick="prevQuestion()">→ السابق</button>
    <button class="btn-next" id="btn-next" onclick="nextQuestion()">التالي ←</button>
  </div>
</div>

<!-- ══ RESULT ══ -->
<div id="screen-result" class="screen">
  <div class="result-circle" id="result-circle">
    <div id="result-pct-num" style="font-size:32px;font-weight:900">0%</div>
    <div class="result-pct-label">النتيجة</div>
  </div>
  <div class="result-msg">
    <h2 id="result-emoji-msg">💪 أحسنت!</h2>
    <p id="result-sub">استمر في المراجعة</p>
  </div>
  <div class="result-stats">
    <div class="rs-card">
      <div class="rs-num" id="res-correct" style="color:var(--green)">0</div>
      <div class="rs-label">✅ إجابات صحيحة</div>
    </div>
    <div class="rs-card">
      <div class="rs-num" id="res-wrong" style="color:var(--red)">0</div>
      <div class="rs-label">❌ إجابات خاطئة</div>
    </div>
    <div class="rs-card" style="grid-column:1/-1">
      <div class="rs-num" id="res-total" style="color:var(--orange)">0</div>
      <div class="rs-label">📋 إجمالي الأسئلة</div>
    </div>
  </div>
  <div class="result-btns">
    <button class="btn-review" id="btn-review-wrap" onclick="showReview()">📖 راجع الأسئلة الغلط</button>
    <button class="btn-restart" onclick="restartQuiz()">🔄 ابدأ من جديد</button>
  </div>
</div>

<!-- ══ REVIEW ══ -->
<div id="screen-review" class="screen">
  <div class="review-header" style="width:100%">
    <div class="review-title">❌ الأسئلة الخاطئة</div>
    <div class="review-count" id="wrong-count-badge">0</div>
  </div>
  <div id="review-list" style="width:100%;display:flex;flex-direction:column;gap:14px"></div>
  <button class="btn-back" onclick="showScreen('screen-result')">← الرجوع للنتيجة</button>
</div>

<script>
const LETTERS = ['أ', 'ب', 'ج', 'د'];

const MC = [
  {
    q: "هي النشاط الإنساني الهادف إلى المشاركة في وضع السياسات العامة للدولة ووضعها موضع التنفيذ، وتمارس في إطار الوحدات والمؤسسات المملوكة للدولة للخدمة والإنتاجية من خلال التخطيط والتنظيم والتوجيه والرقابة بهدف رفع مستوى المعيشة ورفاهية المجتمع.",
    ch: [
      "الإدارة الحكومية",
      "إدارة الأعمال",
      "السياسة العامة للدولة",

    ],
    a: 0
  },
  {
    q: "........ هي ترجمة الأهداف العامة لمجالات الأنشطة السياسية والاقتصادية والاجتماعية ومختلف مجالات الأنشطة التي تتدخل فيها الدولة، وقد تكون الأهداف العامة (رشيدة أو غير رشيدة).",
    ch: [
      "الإدارة الحكومية",

    ],

  },
  {

    ch: [
      "أهداف سياسية",
      "أهداف اقتصادية",
      "أهداف اجتماعية",
      "أهداف روحية وأخلاقية",
      "الأهداف الصحية",
      "الأهداف الجمالية",
      "كل ما سبق"
    ],
    a: 6
  },
  {
    q: "........ تتمثل في تحقيق الاستقرار السياسي وحماية النظام الاجتماعي، والتعامل مع المشكلات الخارجية.",
    ch: [
      "الأهداف السياسية",
      "الأهداف الاقتصادية",
      "الأهداف الاجتماعية",
      "الأهداف الصحية"
    ],
    a: 0
  },
  {
    q: "........ تتمثل في توفير السلع والخدمات اللازمة للمجتمع وتحقيق الاستقرار الاقتصادي.",
    ch: [
      "الأهداف السياسية",
      "الأهداف الاقتصادية",
      "الأهداف الاجتماعية",
      "الأهداف الصحية"
    ],
    a: 1
  },
  {
    q: "........ تتمثل في الحفاظ على الاستقرار الاجتماعي وتقليل الفجوة بين الطبقات وتحقيق الرفاهية.",
    ch: [
      "الأهداف السياسية",
      "الأهداف الاقتصادية",
      "الأهداف الاجتماعية",
      "الأهداف الصحية"
    ],
    a: 2
  },
  {
    q: "........ تتمثل في الأنشطة التي تستهدف المحافظة على الصحة العامة لأفراد المجتمع.",
    ch: [
      "الأهداف السياسية",
      "الأهداف الاقتصادية",
      "الأهداف الاجتماعية",
      "الأهداف الصحية"
    ],
    a: 3
  },
  {
    q: "يقصد بها مجموعة الأهداف التي تسعى إلى تنمية الإحساس بالجمال لدى الأفراد من خلال تجميل الميادين العامة.",
    ch: [
      "الأهداف السياسية",
      "الأهداف الاقتصادية",
      "الأهداف الاجتماعية",
      "الأهداف الجمالية"
    ],
    a: 3

document.addEventListener('DOMContentLoaded',()=>{
 const wc=document.getElementById('welcome-count');
 const qt=document.getElementById('q-total');
 if(wc) wc.textContent=MC.length;
 if(qt) qt.textContent=MC.length;
});
// ── state ──
let shuffled = [], current = 0, score = 0, wrongList = [], answered = false, history = [];

// ── particles ──
(function(){
  const p = document.getElementById('particles');
  const colors = ['#E8820C','#2D9E5F','#f0a94a','#3ab575','#3a8fd4'];
  for(let i=0;i<20;i++){
    const d = document.createElement('div');
    d.className = 'particle';
    d.style.left = Math.random()*100+'%';
    d.style.background = colors[i%colors.length];
    const s = 3+Math.random()*5;
    d.style.width = d.style.height = s+'px';
    d.style.animationDuration = (8+Math.random()*14)+'s';
    d.style.animationDelay = (Math.random()*14)+'s';
    p.appendChild(d);
  }
})();

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

function startQuiz(){
  shuffled = shuffle(MC);
  current=0; score=0; wrongList=[]; history=[];
  showScreen('screen-quiz');
  renderQuestion();
}

function renderQuestion(dir){
  const q = shuffled[current];
  const prev = history[current];

  document.getElementById('q-num').textContent = current+1;
  document.getElementById('q-total').textContent = shuffled.length;
  document.getElementById('live-score').textContent = score;
  document.getElementById('progress-bar').style.width = (current/shuffled.length*100)+'%';

  // card animation
  const card = document.getElementById('q-card');
  card.style.animation='none'; void card.offsetWidth;
  card.style.animation = dir==='prev'
    ? 'slideInRight 0.4s cubic-bezier(.4,0,.2,1)'
    : 'slideIn 0.4s cubic-bezier(.4,0,.2,1)';

  document.getElementById('q-text').textContent = q.q;

  // build choices
  const container = document.getElementById('choices');
  container.innerHTML='';
  q.ch.forEach((c,i)=>{
    const btn = document.createElement('button');
    btn.className='choice-btn';
    btn.dataset.idx = i;
    btn.innerHTML=`<div class="choice-letter">${LETTERS[i]}</div><span>${c}</span>`;
    btn.onclick = ()=>answer(i);
    container.appendChild(btn);
  });

  // feedback & nav
  const fb   = document.getElementById('feedback');
  const btnN = document.getElementById('btn-next');
  const btnP = document.getElementById('btn-prev');

  btnP.className = current>0 ? 'btn-prev show' : 'btn-prev';

  if(prev!==undefined){
    // restore state
    answered=true;
    const btns = container.querySelectorAll('.choice-btn');
    btns.forEach(b=>b.disabled=true);

    btns[prev.chosen].classList.add(prev.isCorrect?'correct':'wrong');
    if(!prev.isCorrect){
      btns[q.a].classList.add('correct');
      btns.forEach((b,i)=>{ if(i!==prev.chosen&&i!==q.a) b.classList.add('dim'); });
    } else {
      btns.forEach((b,i)=>{ if(i!==prev.chosen) b.classList.add('dim'); });
    }

    if(prev.isCorrect){
      fb.className='feedback-box correct-fb show';
      fb.innerHTML=`<div class="feedback-title">✅ إجابة صحيحة!</div>أحسنت! اخترت الإجابة الصحيحة.`;
    } else {
      fb.className='feedback-box wrong-fb show';
      fb.innerHTML=`<div class="feedback-title">❌ إجابة خاطئة</div>
        الإجابة الصحيحة هي: <strong>${LETTERS[q.a]}) ${q.ch[q.a]}</strong>`;
    }
    btnN.className='btn-next show';
  } else {
    answered=false;
    fb.className='feedback-box'; fb.innerHTML='';
    btnN.className='btn-next';
  }
}

function answer(chosen){
  if(answered) return;
  answered=true;

  const q = shuffled[current];
  const isCorrect = chosen===q.a;

  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b=>b.disabled=true);

  btns[chosen].classList.add(isCorrect?'correct':'wrong');
  if(!isCorrect) btns[q.a].classList.add('correct');
  btns.forEach((b,i)=>{
    if(i!==chosen && i!==q.a) b.classList.add('dim');
    else if(isCorrect && i===chosen) {} // keep
  });

  // save history
  history[current]={chosen, isCorrect};

  if(isCorrect){
    score++;
    document.getElementById('live-score').textContent=score;
    const fb=document.getElementById('feedback');
    fb.className='feedback-box correct-fb show';
    fb.innerHTML=`<div class="feedback-title">✅ إجابة صحيحة!</div>أحسنت! اخترت الإجابة الصحيحة.`;
  } else {
    const fb=document.getElementById('feedback');
    fb.className='feedback-box wrong-fb show';
    fb.innerHTML=`<div class="feedback-title">❌ إجابة خاطئة</div>
      الإجابة الصحيحة هي: <strong>${LETTERS[q.a]}) ${q.ch[q.a]}</strong>`;
    const already = wrongList.find(w=>w.origIdx===current);
    if(!already){
      wrongList.push({
        origIdx: current,
        num: current+1,
        q: q.q,
        chosenText: q.ch[chosen],
        chosenLetter: LETTERS[chosen],
        correctText: q.ch[q.a],
        correctLetter: LETTERS[q.a]
      });
    }
  }

  document.getElementById('btn-next').className='btn-next show';
}

function nextQuestion(){
  current++;
  if(current<shuffled.length) renderQuestion('next');
  else showResultScreen();
}

function prevQuestion(){
  if(current<=0) return;
  current--;
  renderQuestion('prev');
}

function showResultScreen(){
  const total=shuffled.length;
  const pct=Math.round(score/total*100);

  let color,msg,sub;
  if(pct>=90)      {color='#2D9E5F';msg='🏆 ممتاز! أداء رائع!';        sub='نتيجة رائعة جداً، استمر!';}
  else if(pct>=75) {color='#E8820C';msg='💪 جيد جداً! كمّل!';          sub='قريب من التميز، راجع الأخطاء.';}
  else if(pct>=60) {color='#f0a94a';msg='📚 جيد، بس لازم مراجعة!';     sub='في أخطاء محتاج تراجعها.';}
  else             {color='#E84444';msg='📖 محتاج مراجعة أكتر!';       sub='راجع الأسئلة الغلط وحاول تاني.';}

  const circle=document.getElementById('result-circle');
  circle.style.setProperty('--c1',color);
  circle.style.setProperty('--pct',pct+'%');
  document.getElementById('result-pct-num').textContent=pct+'%';
  document.getElementById('result-pct-num').style.color=color;
  document.getElementById('result-emoji-msg').textContent=msg;
  document.getElementById('result-emoji-msg').style.color=color;
  document.getElementById('result-sub').textContent=sub;
  document.getElementById('res-correct').textContent=score;
  document.getElementById('res-wrong').textContent=total-score;
  document.getElementById('res-total').textContent=total;

  const rb=document.getElementById('btn-review-wrap');
  if(wrongList.length===0){ rb.style.display='none'; }
  else { rb.style.display='block'; rb.textContent=`📖 راجع الـ ${wrongList.length} سؤال اللي غلطت فيها`; }

  if(pct>=75) launchConfetti();
  showScreen('screen-result');
}

function showReview(){
  const list=document.getElementById('review-list');
  list.innerHTML='';
  document.getElementById('wrong-count-badge').textContent=wrongList.length+' سؤال';

  wrongList.forEach((item,i)=>{
    const div=document.createElement('div');
    div.className='review-item';
    div.style.animationDelay=(i*0.05)+'s';
    div.innerHTML=`
      <div class="review-q-num">السؤال رقم ${item.num}</div>
      <div class="review-q-text">${item.q}</div>
      <div class="review-row">
        <span class="review-tag tag-wrong">إجابتك</span>
        <span class="review-answer-text">${item.chosenLetter}) ${item.chosenText}</span>
      </div>
      <div class="review-row">
        <span class="review-tag tag-correct">الصحيح</span>
        <span class="review-answer-text">${item.correctLetter}) ${item.correctText}</span>
      </div>`;
    list.appendChild(div);
  });
  showScreen('screen-review');
}

function restartQuiz(){ startQuiz(); }

function launchConfetti(){
  const colors=['#E8820C','#2D9E5F','#f0a94a','#3ab575','#fff','#ffdd00','#3a8fd4'];
  for(let i=0;i<65;i++){
    setTimeout(()=>{
      const c=document.createElement('div');
      c.className='confetti-piece';
      c.style.left=Math.random()*100+'vw';
      c.style.background=colors[Math.floor(Math.random()*colors.length)];
      c.style.transform=`rotate(${Math.random()*360}deg)`;
      c.style.animationDuration=(2+Math.random()*2)+'s';
      c.style.animationDelay=(Math.random()*0.5)+'s';
      c.style.width=(6+Math.random()*8)+'px';
      c.style.height=(10+Math.random()*14)+'px';
      document.body.appendChild(c);
      setTimeout(()=>c.remove(),4000);
    },i*38);
  }
}
